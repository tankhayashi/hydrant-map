<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>富山市 消火栓マップ</title>
  <style>
    :root {
      --panel-bg: rgba(255, 255, 255, 0.95);
      --border: #d9d9d9;
      --shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      --accent: #0b57d0;
      --danger: #d93025;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      overflow: hidden;
      background: #fff;
    }

    #map {
      width: 100%;
      height: 100dvh;
    }

    /* 上部ヘッダー */
    #topBar {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      left: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 10px 12px;
      box-sizing: border-box;
      backdrop-filter: blur(6px);
    }

    #titleBlock {
      min-width: 0;
    }

    #title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }

    #subInfo {
      font-size: 12px;
      color: #555;
      margin-top: 2px;
    }

    #zoomInfo {
      white-space: nowrap;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
    }

    /* エリアパネル */
    #areaPanel {
      position: fixed;
      top: calc(max(10px, env(safe-area-inset-top)) + 70px);
      left: 10px;
      right: 10px;
      z-index: 1000;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 10px;
      box-sizing: border-box;
      backdrop-filter: blur(6px);
      display: none;
    }

    #areaPanel.open {
      display: block;
    }

    #areaPanelHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    #areaPanelHeader strong {
      font-size: 14px;
    }

    #areaPanelHeader button {
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
    }

    #areaControls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    #areaControls label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
    }

    /* 下部フローティング操作 */
    #floatingControls {
      position: fixed;
      left: 50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 1000;
      width: min(96vw, 760px);
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 10px;
      box-sizing: border-box;
      backdrop-filter: blur(6px);
    }

    #mainButtons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    #mainButtons button,
    #subButtons button {
      min-height: 48px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #mainButtons button:active,
    #subButtons button:active,
    #areaPanelHeader button:active {
      background: #eef5ff;
    }

    #subButtons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    #statusBar {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: calc(150px + env(safe-area-inset-bottom));
      z-index: 1000;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      box-sizing: border-box;
      display: none;
    }

    #statusBar.show {
      display: block;
    }

    @media (min-width: 900px) {
      #topBar {
        left: 16px;
        right: 16px;
      }

      #areaPanel {
        left: 16px;
        right: auto;
        width: 420px;
      }

      #floatingControls {
        width: auto;
        min-width: 560px;
      }

      #mainButtons {
        grid-template-columns: repeat(6, auto);
      }

      #subButtons {
        grid-template-columns: repeat(3, auto);
        justify-content: center;
      }

      #mainButtons button,
      #subButtons button {
        min-width: 110px;
        padding: 0 14px;
      }

      #statusBar {
        left: 16px;
        right: auto;
        max-width: 420px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="topBar">
    <div id="titleBlock">
      <div id="title">富山市内 消火栓マップ</div>
      <div id="subInfo">現在地中心 / 最寄り消火栓表示</div>
    </div>
    <div id="zoomInfo">Zoom: --</div>
  </div>

  <div id="areaPanel">
    <div id="areaPanelHeader">
      <strong>表示エリア</strong>
      <button onclick="toggleAreas()">全選択/解除</button>
    </div>
    <div id="areaControls"></div>
  </div>

  <div id="statusBar"></div>

  <div id="floatingControls">
    <div id="mainButtons">
      <button onclick="moveToCurrent()">📍 現在地</button>
      <button onclick="moveToNearest()">🚒 最寄り</button>
      <button onclick="refreshCurrentLocation()">🧭 更新</button>
      <button onclick="zoomIn()">＋ 拡大</button>
      <button onclick="zoomOut()">－ 縮小</button>
      <button onclick="toggleAreaPanel()">🧯 エリア</button>
    </div>
    <div id="subButtons">
      <button onclick="fitCurrentAndNearest()">↔ 両方表示</button>
      <button onclick="setZoomLevel(15)">市内表示</button>
      <button onclick="setZoomLevel(17)">現場表示</button>
    </div>
  </div>

  <script>
    let map;
    let clusterer = null;
    let hydrantData = [];
    let currentPosition = null;
    let currentLocationMarker = null;
    let nearestMarker = null;
    let nearestInfoWindow = null;
    let routeLine = null;
    let nearestHydrant = null;
    let allAreasChecked = true;
    let currentMarkers = [];

    const CLUSTER_ZOOM_THRESHOLD = 15;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.6953, lng: 137.2113 },
        zoom: 11,
        keyboardShortcuts: true,
        zoomControl: true,
        gestureHandling: "greedy",
        fullscreenControl: false,
        mapTypeControl: false,
        streetViewControl: false
      });

      createAreaControls();
      loadHydrants();
      getCurrentLocation();
      updateZoomInfo();

      map.addListener("zoom_changed", () => {
        updateZoomInfo();
        updateMarkerDisplayMode();
      });

      setupKeyboardShortcuts();
    }

    function createAreaControls() {
      const container = document.getElementById("areaControls");
      for (let i = 1; i <= 10; i++) {
        const label = document.createElement("label");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = i;
        checkbox.checked = true;
        checkbox.addEventListener("change", renderMarkers);

        label.appendChild(checkbox);
        label.append("エリア" + i);
        container.appendChild(label);
      }
    }

    function toggleAreaPanel() {
      document.getElementById("areaPanel").classList.toggle("open");
    }

    function showStatus(message, ms = 2500) {
      const bar = document.getElementById("statusBar");
      bar.textContent = message;
      bar.classList.add("show");
      clearTimeout(showStatus._timer);
      showStatus._timer = setTimeout(() => {
        bar.classList.remove("show");
      }, ms);
    }

    function loadHydrants() {
      fetch("hydrants.json")
        .then(response => {
          if (!response.ok) {
            throw new Error("hydrants.json の読み込みに失敗しました");
          }
          return response.json();
        })
        .then(data => {
          hydrantData = data;
          renderMarkers();
          showStatus(`消火栓 ${data.length} 件を読み込みました`, 1800);
        })
        .catch(error => {
          console.error("読み込みエラー:", error);
          alert("hydrants.json を読み込めませんでした");
        });
    }

    function getCurrentLocation() {
      if (!navigator.geolocation) {
        alert("このブラウザは位置情報取得に対応していません");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        position => {
          currentPosition = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };

          if (currentLocationMarker) {
            currentLocationMarker.setMap(null);
          }

          currentLocationMarker = new google.maps.Marker({
            position: currentPosition,
            map: map,
            title: "現在地",
            icon: {
              url: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
            },
            zIndex: 9998
          });

          map.setCenter(currentPosition);
          map.setZoom(17);
          updateZoomInfo();
          renderMarkers();
          showStatus("現在地を取得しました");
        },
        error => {
          console.error("現在地取得失敗:", error);
          alert("現在地を取得できませんでした");
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    function refreshCurrentLocation() {
      getCurrentLocation();
    }

    function moveToCurrent() {
      if (!currentPosition) {
        alert("現在地がまだ取得されていません");
        return;
      }
      map.setCenter(currentPosition);
      map.setZoom(17);
      updateZoomInfo();
      showStatus("現在地へ移動しました");
    }

    function moveToNearest() {
      if (!nearestHydrant) {
        alert("最寄り消火栓がまだ見つかっていません");
        return;
      }
      map.setCenter({ lat: nearestHydrant.lat, lng: nearestHydrant.lng });
      map.setZoom(18);
      updateZoomInfo();
      showStatus(`最寄り消火栓 ID:${nearestHydrant.id} へ移動しました`);
    }

    function fitCurrentAndNearest() {
      if (!currentPosition || !nearestHydrant) {
        alert("現在地または最寄り消火栓がまだ取得できていません");
        return;
      }

      const bounds = new google.maps.LatLngBounds();
      bounds.extend(currentPosition);
      bounds.extend({ lat: nearestHydrant.lat, lng: nearestHydrant.lng });
      map.fitBounds(bounds);

      google.maps.event.addListenerOnce(map, "bounds_changed", () => {
        if (map.getZoom() > 18) {
          map.setZoom(18);
        }
        updateZoomInfo();
      });

      showStatus("現在地と最寄り消火栓を表示しました");
    }

    function toggleAreas() {
      const checkboxes = document.querySelectorAll("#areaControls input[type='checkbox']");
      allAreasChecked = !allAreasChecked;
      checkboxes.forEach(cb => {
        cb.checked = allAreasChecked;
      });
      renderMarkers();
      showStatus(allAreasChecked ? "全エリアを選択しました" : "全エリアを解除しました");
    }

    function zoomIn() {
      map.setZoom(map.getZoom() + 1);
      updateZoomInfo();
    }

    function zoomOut() {
      map.setZoom(map.getZoom() - 1);
      updateZoomInfo();
    }

    function setZoomLevel(level) {
      map.setZoom(level);
      updateZoomInfo();
      showStatus(`Zoom ${level} に変更しました`, 1200);
    }

    function updateZoomInfo() {
      const zoomInfo = document.getElementById("zoomInfo");
      if (zoomInfo && map) {
        zoomInfo.textContent = `Zoom: ${map.getZoom()}`;
      }
    }

    function setupKeyboardShortcuts() {
      document.addEventListener("keydown", (e) => {
        const tag = document.activeElement.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA") return;

        if (e.key === "+" || e.key === "=") {
          e.preventDefault();
          zoomIn();
        }

        if (e.key === "-") {
          e.preventDefault();
          zoomOut();
        }

        if (e.key === "0") {
          e.preventDefault();
          moveToCurrent();
        }

        if (e.key === "n" || e.key === "N") {
          e.preventDefault();
          moveToNearest();
        }
      });
    }

    function renderMarkers() {
      const checkedAreas = Array.from(
        document.querySelectorAll("#areaControls input:checked")
      ).map(cb => parseInt(cb.value, 10));

      const filtered = hydrantData.filter(h => checkedAreas.includes(h.area));

      clearHydrantDisplay();

      currentMarkers = filtered.map(h => {
        const marker = new google.maps.Marker({
          position: { lat: h.lat, lng: h.lng },
          title: `消火栓ID: ${h.id} / Area: ${h.area}`
        });

        const infoWindow = new google.maps.InfoWindow({
          content: `
            <div style="font-size:14px;line-height:1.5;">
              <div><strong>消火栓ID:</strong> ${h.id}</div>
              <div><strong>エリア:</strong> ${h.area}</div>
              <div><strong>緯度:</strong> ${h.lat}</div>
              <div><strong>経度:</strong> ${h.lng}</div>
            </div>
          `
        });

        marker.addListener("click", () => {
          infoWindow.open({
            anchor: marker,
            map
          });
        });

        return marker;
      });

      updateMarkerDisplayMode();
      showNearestHydrant(filtered);
    }

    function clearHydrantDisplay() {
      if (clusterer) {
        clusterer.clearMarkers();
        clusterer = null;
      }

      currentMarkers.forEach(marker => {
        marker.setMap(null);
      });

      currentMarkers = [];
    }

    function updateMarkerDisplayMode() {
      if (!map || currentMarkers.length === 0) return;

      const zoom = map.getZoom();

      if (clusterer) {
        clusterer.clearMarkers();
        clusterer = null;
      }

      currentMarkers.forEach(marker => marker.setMap(null));

      if (zoom < CLUSTER_ZOOM_THRESHOLD) {
        clusterer = new markerClusterer.MarkerClusterer({
          map: map,
          markers: currentMarkers
        });
      } else {
        currentMarkers.forEach(marker => marker.setMap(map));
      }
    }

    function showNearestHydrant(filteredHydrants) {
      if (!currentPosition || filteredHydrants.length === 0) {
        nearestHydrant = null;

        if (nearestMarker) {
          nearestMarker.setMap(null);
          nearestMarker = null;
        }

        if (nearestInfoWindow) {
          nearestInfoWindow.close();
          nearestInfoWindow = null;
        }

        if (routeLine) {
          routeLine.setMap(null);
          routeLine = null;
        }

        return;
      }

      if (nearestMarker) {
        nearestMarker.setMap(null);
        nearestMarker = null;
      }

      if (nearestInfoWindow) {
        nearestInfoWindow.close();
        nearestInfoWindow = null;
      }

      if (routeLine) {
        routeLine.setMap(null);
        routeLine = null;
      }

      let nearest = null;
      let minDistance = Infinity;

      filteredHydrants.forEach(h => {
        const distance = getDistanceMeters(
          currentPosition.lat,
          currentPosition.lng,
          h.lat,
          h.lng
        );

        if (distance < minDistance) {
          minDistance = distance;
          nearest = h;
        }
      });

      if (!nearest) return;

      nearestHydrant = nearest;

      nearestMarker = new google.maps.Marker({
        position: { lat: nearest.lat, lng: nearest.lng },
        map: map,
        title: `最寄り消火栓 ID:${nearest.id}`,
        icon: {
          url: "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
        },
        zIndex: 9999
      });

      nearestInfoWindow = new google.maps.InfoWindow({
        content: `
          <div style="font-size:14px;line-height:1.6;">
            <div><strong>最寄り消火栓</strong></div>
            <div>ID: ${nearest.id}</div>
            <div>エリア: ${nearest.area}</div>
            <div>距離: ${Math.round(minDistance)} m</div>
          </div>
        `
      });

      nearestInfoWindow.open({
        anchor: nearestMarker,
        map
      });

      routeLine = new google.maps.Polyline({
        path: [
          currentPosition,
          { lat: nearest.lat, lng: nearest.lng }
        ],
        geodesic: true,
        strokeColor: "#ff0000",
        strokeOpacity: 0.9,
        strokeWeight: 3,
        map: map
      });

      map.setCenter(currentPosition);
      map.setZoom(17);
      updateZoomInfo();
    }

    function getDistanceMeters(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const toRad = deg => deg * Math.PI / 180;

      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) *
        Math.cos(toRad(lat2)) *
        Math.sin(dLng / 2) *
        Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    window.initMap = initMap;
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAOifq4jFlcx5N5K9GUoz4bpO-33jTpnrg&callback=initMap">
  </script>
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
</body>
</html>
